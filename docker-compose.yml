version: '3.8'

networks:
  zeitgeist:
    driver: bridge

volumes:
  zookeeper_data:
  kafka_data:
  flink_data:

services:

  # ── ZOOKEEPER ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zeitgeist-zookeeper
    networks:
      - zeitgeist
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── KAFKA BROKER ───────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: zeitgeist-kafka
    networks:
      - zeitgeist
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"       # Host access for producers/consumers
      - "29092:29092"     # Internal docker network access
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── KAFKA TOPIC INIT ───────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: zeitgeist-kafka-init
    networks:
      - zeitgeist
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'

      kafka-topics --create --if-not-exists \
        --bootstrap-server kafka:29092 \
        --topic raw.reddit \
        --partitions 3 \
        --replication-factor 1

      kafka-topics --create --if-not-exists \
        --bootstrap-server kafka:29092 \
        --topic raw.youtube \
        --partitions 3 \
        --replication-factor 1

      kafka-topics --create --if-not-exists \
        --bootstrap-server kafka:29092 \
        --topic raw.news \
        --partitions 3 \
        --replication-factor 1

      kafka-topics --create --if-not-exists \
        --bootstrap-server kafka:29092 \
        --topic processed.signals \
        --partitions 3 \
        --replication-factor 1

      echo 'Topics created successfully:'
      kafka-topics --list --bootstrap-server kafka:29092
      "

  # ── KAFDROP (KAFKA UI) ─────────────────────────────────────
  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: zeitgeist-kafdrop
    networks:
      - zeitgeist
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
      JVM_OPTS: "-Xms32M -Xmx64M"
      SERVER_SERVLET_CONTEXTPATH: "/"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── FLINK JOBMANAGER ───────────────────────────────────────
  flink-jobmanager:
    image: flink:1.18-scala_2.12
    container_name: zeitgeist-flink-jobmanager
    networks:
      - zeitgeist
    ports:
      - "8081:8081"       # Flink UI
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1600m
        taskmanager.memory.process.size: 1728m
        parallelism.default: 2
    volumes:
      - flink_data:/opt/flink/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── FLINK TASKMANAGER ──────────────────────────────────────
  flink-taskmanager:
    image: flink:1.18-scala_2.12
    container_name: zeitgeist-flink-taskmanager
    networks:
      - zeitgeist
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.memory.process.size: 1728m
        taskmanager.numberOfTaskSlots: 4
    volumes:
      - flink_data:/opt/flink/data
